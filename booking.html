<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>预约到店｜Le Fame</title><link rel="stylesheet" href="./styles.css"><link rel="stylesheet" href="./inner.css"></head>
<body>
<header class="site-header is-scrolled" data-header><a class="brand-mark" href="./index.html"><img src="./assets/lefame_logo_black_crop.png" alt="Le Fame"></a><nav class="desktop-nav"><a href="./collection-autumn-2026.html">NEW</a><a href="./wardrobes.html">WARDROBES</a><a href="./brand.html">LE FAME</a><a href="./journal.html">JOURNAL</a><a href="./stores.html">STORES</a></nav><div class="header-actions"><a class="visit-link" href="./booking.html">预约到店</a><button class="menu-button" aria-label="打开菜单" aria-expanded="false" data-menu-button><span></span><span></span></button></div><nav class="mobile-nav" data-mobile-nav><a href="./index.html">首页</a><a href="./stores.html">查找门店</a><a href="./wardrobes.html">拉飞姆衣橱</a></nav></header>
<main class="inner-main"><section class="booking-shell"><div class="booking-intro"><p class="section-index">BOOK A VISIT</p><h1>期待与你相见</h1><p>留下到店意向，对应门店顾问将通过电话或企业微信与你联系，确认时间并准备感兴趣的衣橱。</p></div><form class="booking-form" data-visit-form><label><span>城市</span><select name="city"><option value="shanghai">上海 Shanghai</option><option value="hangzhou">杭州 Hangzhou</option><option value="chengdu">成都 Chengdu</option><option value="beijing">北京 Beijing</option></select></label><label><span>门店</span><select name="store"><option>Suite Le Fame</option><option>Le Fame 精品店</option></select></label><label><span>到店日期</span><input type="date" name="date" required></label><label><span>希望时段</span><select name="time"><option>10:00–12:00</option><option>12:00–15:00</option><option>15:00–18:00</option><option>18:00–21:00</option></select></label><label><span>姓名</span><input type="text" name="name" placeholder="请输入姓名" required></label><label><span>手机号</span><input type="tel" name="phone" placeholder="+86" required></label><label class="form-wide"><span>感兴趣的衣橱</span><select name="wardrobe"><option>赫本衣橱</option><option>摩登工装衣橱</option><option>趋势衣橱</option><option>暂未决定，希望顾问推荐</option></select></label><label class="form-wide"><span>备注</span><textarea name="note" placeholder="可填写场合、尺码或希望试穿的 Look"></textarea></label><label class="privacy-row"><input type="checkbox" required><span>我已阅读并同意隐私说明，授权 Le Fame 门店顾问就本次预约与我联系。</span></label><button class="button button-dark" type="submit">提交预约意向</button><p class="form-note" data-form-note>本页面为官网原型，不会发送或保存你的信息。</p></form></section></main>
<script src="./script.js"></script><script>const city=new URLSearchParams(location.search).get("city");if(city){const select=document.querySelector('select[name="city"]');if(select)select.value=city;}</script>
</body></html>
